services:
  - type: web
    name: form-summit
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SUPABASE_URL
        sync: false # Você preencherá no painel do Render
      - key: SUPABASE_ANON_KEY
        sync: false # Você preencherá no painel do Render
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false # Recomendado para o servidor
      - key: PORT
        value: 3000
      - key: OPENAI_API_KEY
        sync: false # Chave da OpenAI (https://platform.openai.com)
      - key: DEEPSEEK_API_KEY
        sync: false # Chave da DeepSeek (https://platform.deepseek.com)
